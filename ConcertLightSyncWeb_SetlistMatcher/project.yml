name: ConcertLightSync
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    DEVELOPMENT_TEAM: ""
targets:
  ConcertLightSync:
    type: application
    platform: iOS
    sources:
      - path: ConcertLightSync
        excludes:
          - Resources/ReferenceAudio/README.md
          - Resources/Sequences/README.md
    resources:
      - path: ConcertLightSync/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ConcertLightSync
        INFOPLIST_FILE: ConcertLightSync/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
    dependencies: []
